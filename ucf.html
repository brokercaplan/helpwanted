<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCF Class Tracker</title>
<style>
:root{
  --gold:#FFC904;--ucfblack:#231F20;
  --bg:#f2f3f5;--card:#fff;--border:#e0e2e8;--text:#1a1a1a;--muted:#6b7280;
  --open:#16a34a;--open-bg:#dcfce7;--open-b:#86efac;
  --wait:#d97706;--wait-bg:#fef3c7;--wait-b:#fcd34d;
  --closed:#dc2626;--closed-bg:#fee2e2;--closed-b:#fca5a5;
  --unk:#6b7280;--unk-bg:#f3f4f6;--unk-b:#d1d5db;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--ucfblack);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.badge{background:var(--gold);color:var(--ucfblack);padding:3px 9px;border-radius:5px;font-weight:900;font-size:13px}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;color:#fff;text-decoration:none}
#hTerm{margin-left:auto;font-size:13px;color:rgba(255,255,255,.6)}
main{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--card);border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}
.card h2{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
select{border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:14px;background:#fff;color:var(--text);outline:none;min-width:190px}
textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:monospace;resize:vertical;outline:none;background:#fafafa;color:var(--text);min-height:100px;line-height:1.7}
textarea:focus{border-color:var(--gold);background:#fff}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-gold{background:var(--gold);color:var(--ucfblack)}
.btn-ghost{background:#fff;color:var(--text);border:1.5px solid var(--border)}
/* setup banner */
.setup-banner{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:16px 18px;margin-bottom:16px;font-size:13.5px;line-height:1.6}
.setup-banner strong{display:block;margin-bottom:6px;font-size:15px}
.setup-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;font-family:monospace;outline:none;margin-top:8px}
/* results */
.results-grid{display:flex;flex-direction:column;gap:10px}
.result-row{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:5px solid var(--unk-b)}
.result-row.open{border-left-color:var(--open)}
.result-row.waitlist{border-left-color:var(--wait)}
.result-row.closed{border-left-color:var(--closed)}
.result-row.error{border-left-color:#f59e0b}
.rh{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.rcode{font-size:17px;font-weight:800;font-family:monospace;color:#000}
.status-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase}
.s-open{background:var(--open-bg);color:var(--open)}
.s-waitlist{background:var(--wait-bg);color:var(--wait)}
.s-closed{background:var(--closed-bg);color:var(--closed)}
.s-unknown{background:var(--unk-bg);color:var(--unk)}
.s-error{background:#fef3c7;color:#92400e}
.sections-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
.sections-table th{text-align:left;font-weight:600;color:var(--muted);padding:4px 8px;border-bottom:1px solid var(--border)}
.sections-table td{padding:5px 8px;border-bottom:1px solid #f3f4f6;color:var(--text)}
.sections-table tr:last-child td{border-bottom:none}
.err-msg{font-size:13px;color:#92400e;margin-top:4px}
/* loading */
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,201,4,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{background:var(--card);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.07)}
/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:9px 16px;border-radius:8px;font-size:13.5px;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>
<header>
  <a class="logo" href="#"><span class="badge">UCF</span> Class Tracker</a>
  <span id="hTerm"></span>
</header>
<main>

  <!-- Setup banner (shown until worker URL is configured) -->
  <div class="setup-banner" id="setupBanner" style="display:none">
    <strong>&#9881; One-time setup needed</strong>
    After deploying the Cloudflare Worker, paste your worker URL below.
    It looks like: <code>https://helpwanted-api.YOURNAME.workers.dev</code>
    <input class="setup-input" id="workerUrlInput" placeholder="https://helpwanted-api.yourname.workers.dev" />
    <div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn btn-gold" id="saveWorkerBtn">Save URL</button>
      <button class="btn btn-ghost" id="skipSetupBtn">Use demo mode (no live data)</button>
    </div>
  </div>

  <div class="card">
    <h2>Search Classes</h2>
    <div class="field">
      <label>Term</label>
      <select id="termSel">
        <option value="2265">Summer 2026</option>
        <option value="2268" selected>Fall 2026</option>
        <option value="2271">Spring 2027</option>
        <option value="2261">Spring 2026</option>
        <option value="2258">Fall 2025</option>
      </select>
    </div>
    <div class="field">
      <label>Course Numbers &mdash; one per line</label>
      <textarea id="courseInput" placeholder="COP3330&#10;MAC2311&#10;PHY2048C&#10;ENC1101"></textarea>
    </div>
    <div class="btns">
      <button class="btn btn-gold" id="searchBtn">&#128269; Check Availability</button>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
      Worker: <span id="workerStatus"></span> &nbsp;
      <a href="#" id="changeWorkerLink" style="color:var(--gold);text-decoration:none">change</a>
    </div>
  </div>

  <div id="resultsArea"></div>

</main>
<div class="toast" id="toast"></div>
<script>
var TERMS={'2255':'Summer 2025','2258':'Fall 2025','2261':'Spring 2026','2265':'Summer 2026','2268':'Fall 2026','2271':'Spring 2027'};
var WORKER_KEY='ucf-worker-url';
var workerURL=localStorage.getItem(WORKER_KEY)||'';

function init(){
  document.getElementById('termSel').addEventListener('change',function(){
    document.getElementById('hTerm').textContent=TERMS[this.value]||'';
  });
  document.getElementById('hTerm').textContent=TERMS[document.getElementById('termSel').value]||'';
  document.getElementById('searchBtn').addEventListener('click',doSearch);
  document.getElementById('saveWorkerBtn').addEventListener('click',saveWorker);
  document.getElementById('skipSetupBtn').addEventListener('click',function(){
    document.getElementById('setupBanner').style.display='none';
  });
  document.getElementById('changeWorkerLink').addEventListener('click',function(e){
    e.preventDefault();
    document.getElementById('setupBanner').style.display='block';
    document.getElementById('workerUrlInput').value=workerURL;
    document.getElementById('workerUrlInput').focus();
  });
  updateWorkerStatus();
}

function saveWorker(){
  var url=document.getElementById('workerUrlInput').value.trim().replace(/\/$/,'');
  if (!url) { showToast('Enter your worker URL'); return; }
  workerURL=url;
  localStorage.setItem(WORKER_KEY, url);
  document.getElementById('setupBanner').style.display='none';
  updateWorkerStatus();
  showToast('Worker URL saved!');
}

function updateWorkerStatus(){
  var el=document.getElementById('workerStatus');
  if (workerURL) {
    el.textContent=workerURL;
    el.style.color='var(--open)';
    document.getElementById('setupBanner').style.display='none';
  } else {
    el.textContent='not configured';
    el.style.color='var(--closed)';
    document.getElementById('setupBanner').style.display='block';
  }
}

function parseCourse(raw){
  var s=raw.trim().toUpperCase().replace(/\s+/g,'');
  if(!s)return null;
  var m=s.match(/^([A-Z]{2,4})(\d{4}[A-Z]?)$/);
  return m?{code:s,subject:m[1],number:m[2]}:null;
}

function doSearch(){
  var raw=document.getElementById('courseInput').value;
  var term=document.getElementById('termSel').value;
  var lines=raw.split(/[\n,;]+/).map(function(s){return s.trim();}).filter(Boolean);
  var codes=lines.filter(function(l){return parseCourse(l);});
  if (!codes.length){showToast('Enter at least one course number');return;}
  if (!workerURL){document.getElementById('setupBanner').style.display='block';showToast('Set up your worker URL first');return;}

  // Show loading
  var area=document.getElementById('resultsArea');
  area.innerHTML=codes.map(function(c){
    return '<div class="loading-row"><div class="spinner"></div><span>Checking '+c+'...</span></div>';
  }).join('');

  var url=workerURL+'/api/ucf?term='+term+'&courses='+encodeURIComponent(codes.join(','));
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){renderResults(data.results||[]);}
    ).catch(function(e){
      area.innerHTML='<div class="result-row error"><div class="rh"><span style="color:#92400e">&#10060; Error: '+e.message+'</span></div></div>';
    });
}

function renderResults(results){
  var area=document.getElementById('resultsArea');
  if (!results.length){area.innerHTML='<div class="empty"><div class="empty-icon">&#128218;</div><p>No results</p></div>';return;}
  area.innerHTML='<div class="results-grid">'+results.map(renderRow).join('')+'</div>';
}

function renderRow(r){
  var statusClass=r.error?'error':(r.overall||'unknown').toLowerCase().replace(/[^a-z]/g,'');
  var badgeClass='s-'+(r.error?'error':statusClass==='waitlist'?'waitlist':statusClass==='open'?'open':statusClass==='closed'?'closed':'unknown');
  var badgeText=r.error?'Error':(r.overall||'Unknown');

  var sectionsHtml='';
  if (r.sections&&r.sections.length) {
    sectionsHtml='<table class="sections-table"><tr><th>Section</th><th>Days</th><th>Time</th><th>Instructor</th><th>Status</th><th>Seats</th></tr>'
      +r.sections.map(function(s){
        return '<tr><td>'+(s.classNum||s.section||'-')+'</td><td>'+(s.days||'-')+'</td><td>'+(s.time||'-')+'</td><td>'+(s.instructor||'-')+'</td><td>'+(s.status||'-')+'</td><td>'+(s.seats||'-')+'</td></tr>';
      }).join('')+'</table>';
  }

  var errHtml=r.error?'<div class="err-msg">'+r.error+'</div>':'';
  var msgHtml=(r.message&&!r.error)?'<div style="font-size:13px;color:var(--muted);margin-top:4px">'+r.message+'</div>':'';

  return '<div class="result-row '+statusClass+'">'+'<div class="rh"><span class="rcode">'+r.course+'</span><span class="status-badge '+badgeClass+'">'+badgeText+'</span></div>'+sectionsHtml+errHtml+msgHtml+'</div>';
}

var toastTimer;
function showToast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show');},2800);
}

init();
</script>
</body>
</html>
