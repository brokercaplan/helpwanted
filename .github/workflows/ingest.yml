name: Daily Job Ingestion

on:
  schedule:
    # Runs once per day at 3 AM UTC (11 PM EST)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Run job ingestion
        working-directory: scripts
        env:
          # Cloudflare credentials (add these in GitHub repo Settings > Secrets)
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          # Optional API keys (free tiers)
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: node ingest.js

      - name: Upload ingestion report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ingestion-report-${{ github.run_id }}
          path: scripts/ingestion-report.json
          retention-days: 7
